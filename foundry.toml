[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = ["@chainlink/contracts/=lib/chainlink-evm/contracts/", "@solmate/=lib/solmate/src/", '@openzeppelin/contracts@4.9.6/=lib/openzeppelin-contracts/contracts/']
via_ir = true
optimizer = true
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
